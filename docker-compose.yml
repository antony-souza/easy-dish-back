  shaka-worker:
    container_name: video-packager
    image: google/shaka-packager
    working_dir: /data
    volumes:
      - ./videos:/data
    networks:
      - backend
    restart: "no"
    
  redis:
    container_name: easy-dish-backend-cache
    image: redis:latest
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: always
    cpus: 0.2
    mem_limit: 256m
    mem_reservation: 128m

  rabbitmq:
    container_name: easy-dish-backend-queue
    image: rabbitmq:4.2-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - rabbitmq-logs:/var/log/rabbitmq
    networks:
      - backend
    restart: always
    cpus: "0.5"
    mem_limit: 256m
    mem_reservation: 128m

volumes:
  redis_data:
  rabbitmq-data:
  rabbitmq-logs:

networks:
  backend:
    driver: bridge
